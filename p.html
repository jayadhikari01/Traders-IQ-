<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Position Sizing - Traders IQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlGQSZgdk2Y6cIV0gBIGHCApGZXPg4lJk",
            authDomain: "traders-iq-app-f5169.firebaseapp.com",
            projectId: "traders-iq-app-f5169",
            storageBucket: "traders-iq-app-f5169.firebasestorage.app",
            messagingSenderId: "411253913617",
            appId: "1:411253913617:web:a8b10dba8bbefe1fb1d9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        window.db = db;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
        window.auth = auth;
        window.serverTimestamp = serverTimestamp;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            background: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #0f172a; 
            -webkit-font-smoothing: antialiased; 
        }

        .mesh-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.12) 0px, transparent 50%);
        }

        .result-card-premium {
            background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(67, 56, 202, 0.4);
            position: relative;
            overflow: hidden;
        }

        .glass-card { 
            background: #FFFFFF; 
            border: 1px solid #e2e8f0; 
            border-radius: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .label-sm { 
            font-size: 10px; 
            font-weight: 900; 
            color: #94A3B8; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            margin-bottom: 10px; 
            display: block; 
        }

        .input-main { 
            width: 100%; 
            background: #f1f5f9; 
            border: 2px solid transparent; 
            border-radius: 1.5rem; 
            padding: 16px 20px; 
            font-weight: 800; 
            outline: none; 
            transition: all 0.3s;
        }

        .input-main:focus {
            border-color: #6366f1;
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .mini-input { 
            width: 90px; 
            background: #f1f5f9; 
            border-radius: 12px; 
            padding: 10px; 
            text-align: center; 
            font-weight: 900; 
            border: none; 
            outline: none; 
        }

        #assetPopup { 
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 3rem 3rem 0 0; 
            z-index: 100; 
            background: white;
        }
        #assetPopup.active { transform: translateY(0); }

        #overlay { 
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease; 
            z-index: 90; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); 
        }
        #overlay.active { opacity: 1; pointer-events: auto; }

        .toggle-btn { 
            padding: 8px 14px; 
            border-radius: 10px; 
            font-size: 9px; 
            font-weight: 900; 
            text-transform: uppercase; 
            transition: all 0.3s; 
        }
        .toggle-active { background: #4F46E5; color: white; }
        .toggle-inactive { background: #f1f5f9; color: #94A3B8; }

        .btn-premium {
            background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%);
            color: white;
        }
    </style>
</head>
<body class="p-4 pb-12">
    <div class="mesh-container"></div>

    <div class="max-w-md mx-auto">
        <div class="flex items-center gap-4 mb-6 mt-4">
            <button onclick="window.history.back()" class="w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-100 rounded-2xl text-slate-400 shadow-sm active:scale-90 transition-all">←</button>
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-slate-900 leading-none">Position <span class="text-indigo-600">Sizing</span></h1>
                <p class="text-[8px] font-black text-slate-400 tracking-widest uppercase mt-1">Traders IQ Lab</p>
            </div>
        </div>

        <div id="resultCard" class="result-card-premium p-10 text-center text-white mb-8 transition-all">
            <div class="absolute top-0 right-0 p-6 opacity-10">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-200/60 mb-2">Recommended Size</p>
            <h2 id="finalSize" class="text-7xl font-black italic tracking-tighter">0.00</h2>
            <p id="unitLabel" class="text-[10px] font-black mt-4 text-indigo-200/60 uppercase tracking-[0.4em]">Contracts</p>
        </div>

        <div class="glass-card p-8 mb-6">
            <div class="mb-8">
                <span class="label-sm">Account Balance ($)</span>
                <input type="number" id="balance" value="25000" class="input-main" oninput="calculate()">
            </div>
            
            <div class="bg-slate-50 p-6 rounded-[2rem] border-2 border-slate-100 space-y-6">
                <div class="flex justify-between items-center px-1">
                    <span class="label-sm !mb-0">Risk %</span>
                    <input type="number" id="riskPercent" value="1.0" class="mini-input" oninput="calculate()">
                </div>
                
                <div class="h-[1px] w-full bg-slate-200"></div>
                
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <span class="label-sm !mb-0">Stop Loss</span>
                        <div class="flex gap-1 bg-slate-200/50 p-1 rounded-xl">
                            <button id="pipBtn" onclick="setUnitType('Pips')" class="toggle-btn toggle-inactive">Pips</button>
                            <button id="pointBtn" onclick="setUnitType('Points')" class="toggle-btn toggle-active">Points</button>
                            <button id="tickBtn" onclick="setUnitType('Ticks')" class="toggle-btn toggle-inactive">Ticks</button>
                        </div>
                    </div>
                    <input type="number" id="stopLoss" value="15" class="input-main text-center text-xl font-black italic" oninput="calculate()">
                </div>
            </div>
        </div>

        <div class="mb-8">
            <button onclick="renderAssetList(); togglePopup(true)" class="w-full bg-white border-2 border-slate-100 rounded-[2rem] p-6 flex justify-between items-center shadow-sm active:scale-95 transition-all">
                <div class="text-left">
                    <span class="label-sm !mb-1">Selected Asset</span>
                    <span id="displayAssetName" class="font-black text-slate-700 text-base italic uppercase tracking-tighter">NQ (Nasdaq)</span>
                </div>
                <div class="bg-indigo-50 px-4 py-2 rounded-xl">
                    <span class="text-indigo-600 text-[9px] font-black uppercase tracking-widest">Select ▼</span>
                </div>
            </button>
        </div>
    </div>

    <div id="overlay" onclick="togglePopup(false)"></div>
    <div id="assetPopup" class="fixed bottom-0 left-0 right-0 p-8 shadow-2xl">
        <div class="w-16 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
        <div class="overflow-y-auto max-h-[60vh] pb-8">
            <h3 class="text-center font-black uppercase text-[10px] tracking-widest text-slate-400 mb-8">Instrument List</h3>
            <div id="assetContainer" class="space-y-3"></div>
            <div class="mt-8 mb-4 px-2 flex justify-between items-center">
                <span class="label-sm !mb-0">Custom Assets</span>
                <button onclick="openCustomModal()" class="text-indigo-600 font-black text-[10px] uppercase tracking-widest">+ Add New</button>
            </div>
            <table class="w-full border-separate border-spacing-y-2" id="customAssetTable"></table>
            <button onclick="togglePopup(false)" class="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black uppercase text-[11px] tracking-widest mt-8">Close Terminal</button>
        </div>
    </div>

    <div id="customModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-sm">
            <span class="label-sm block text-center mb-6">New Asset Config</span>
            <div class="space-y-4">
                <input type="text" id="customName" placeholder="ASSET NAME" class="input-main text-center uppercase">
                <input type="number" id="customMult" placeholder="VALUE PER POINT ($)" class="input-main text-center">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeCustomModal()" class="flex-1 py-4 text-slate-400 font-black text-[10px] uppercase">Cancel</button>
                <button onclick="saveCustomAsset()" class="flex-1 btn-premium py-4 rounded-2xl font-black text-[10px] uppercase">Save</button>
            </div>
        </div>
    </div>

    <div id="confirmOverlay" class="fixed inset-0 z-[300] hidden items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
        <div class="glass-card w-full max-w-xs p-8 text-center">
            <h3 class="label-sm mb-2">Confirm Delete</h3>
            <p class="font-bold text-slate-700 mb-8 px-2">Remove this asset from your list?</p>
            <div class="flex gap-3">
                <button onclick="cancelDelete()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-[10px] uppercase">Cancel</button>
                <button id="confirmDelBtn" class="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-black text-[10px] uppercase">Delete</button>
            </div>
        </div>
    </div>

    <script type="module">
        let multiplier = 20;
        let unit = 'Contracts';
        let unitType = 'Points'; 
        let customAssets = [];
        let indexToDelete = null;
        let currentUser = null;

        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        
        const auth = getAuth();
        
        // HAR USER KA DATA ALAG LOAD HOGA
        onAuthStateChanged(auth, (user) => { 
            if (user) { 
                currentUser = user; 
                loadCloudData(); 
            } 
        });

        async function loadCloudData() {
            if (!currentUser) return;
            // User-specific path: users/UID/positionSizing/settings
            const docRef = window.doc(window.db, "users", currentUser.uid, "tools", "positionSizing");
            const docSnap = await window.getDoc(docRef);
            if (docSnap.exists()) { 
                customAssets = docSnap.data().customAssets || []; 
                // Restore last used values if needed
                if(docSnap.data().lastBalance) document.getElementById('balance').value = docSnap.data().lastBalance;
                if(docSnap.data().lastRisk) document.getElementById('riskPercent').value = docSnap.data().lastRisk;
            }
            renderAssetList();
            calculate();
        }

        async function saveCloudData() {
            if (!currentUser) return;
            const userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            // Har user ka data unki apni UID ke folder mein save hoga
            await window.setDoc(window.doc(window.db, "users", currentUser.uid, "tools", "positionSizing"), { 
                customAssets,
                lastBalance: document.getElementById('balance').value,
                lastRisk: document.getElementById('riskPercent').value,
                timezone: userTimezone,
                lastSync: window.serverTimestamp()
            }, { merge: true });
        }

        window.setUnitType = (type) => {
            unitType = type;
            document.getElementById('pipBtn').className = `toggle-btn ${type==='Pips'?'toggle-active':'toggle-inactive'}`;
            document.getElementById('pointBtn').className = `toggle-btn ${type==='Points'?'toggle-active':'toggle-inactive'}`;
            document.getElementById('tickBtn').className = `toggle-btn ${type==='Ticks'?'toggle-active':'toggle-inactive'}`;
            calculate();
        }

        window.togglePopup = (show) => {
            document.getElementById('assetPopup').classList.toggle('active', show);
            document.getElementById('overlay').classList.toggle('active', show);
        }

        window.openCustomModal = () => { document.getElementById('customModal').style.display = 'flex'; }
        window.closeCustomModal = () => { document.getElementById('customModal').style.display = 'none'; }

        window.saveCustomAsset = () => {
            const name = document.getElementById('customName').value.toUpperCase();
            const mult = parseFloat(document.getElementById('customMult').value);
            if(name && mult) {
                customAssets.push({ name, mult });
                saveCloudData();
                renderAssetList();
                closeCustomModal();
            }
        }

        window.confirmDelete = (index, event) => {
            event.stopPropagation();
            indexToDelete = index;
            document.getElementById('confirmOverlay').style.display = 'flex';
        }

        window.cancelDelete = () => {
            document.getElementById('confirmOverlay').style.display = 'none';
            indexToDelete = null;
        }

        document.getElementById('confirmDelBtn').onclick = () => {
            if (indexToDelete !== null) {
                customAssets.splice(indexToDelete, 1);
                saveCloudData();
                renderAssetList();
            }
            cancelDelete();
        };

        window.renderAssetList = () => {
            const container = document.getElementById('assetContainer');
            container.innerHTML = `
                <div class="label-sm !text-indigo-500 ml-2">Futures</div>
                <div class="space-y-3">
                    <div class="flex items-center justify-between bg-slate-50 p-5 rounded-2xl border-2 border-slate-100" onclick="selectAsset(20, 'Contracts', 'NQ (Nasdaq)')">
                        <span class="font-black text-slate-700 italic">NQ (Nasdaq)</span>
                        <span class="text-[10px] font-black bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg">$20/pt</span>
                    </div>
                    <div class="flex items-center justify-between bg-slate-50 p-5 rounded-2xl border-2 border-slate-100" onclick="selectAsset(50, 'Contracts', 'ES (S&P 500)')">
                        <span class="font-black text-slate-700 italic">ES (S&P 500)</span>
                        <span class="text-[10px] font-black bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg">$50/pt</span>
                    </div>
                </div>
            `;
            const customTable = document.getElementById('customAssetTable');
            customTable.innerHTML = '';
            customAssets.forEach((asset, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="bg-slate-50 p-5 rounded-l-2xl border-y-2 border-l-2 border-slate-100 font-black text-slate-700 italic" onclick="selectAsset(${asset.mult}, 'Units', '${asset.name}')">${asset.name}</td>
                    <td class="bg-slate-50 p-5 rounded-r-2xl border-y-2 border-r-2 border-slate-100 text-right">
                        <span class="text-[10px] font-black bg-slate-200 text-slate-600 px-3 py-1 rounded-lg mr-3">$${asset.mult}/pt</span>
                        <button onclick="confirmDelete(${i}, event)" class="text-rose-400 font-black text-lg">✕</button>
                    </td>
                `;
                customTable.appendChild(tr);
            });
        }

        window.selectAsset = (val, type, name) => {
            multiplier = val;
            unit = type;
            document.getElementById('displayAssetName').innerText = name;
            document.getElementById('unitLabel').innerText = unit;
            if(type === 'Lots') setUnitType('Pips');
            else setUnitType('Points');
            calculate();
            togglePopup(false);
        }

        window.calculate = () => {
            const bal = parseFloat(document.getElementById('balance').value) || 0;
            const risk = parseFloat(document.getElementById('riskPercent').value) || 0;
            let sl = parseFloat(document.getElementById('stopLoss').value) || 0;
            let adjMult = multiplier;
            if (unitType === 'Ticks') adjMult = multiplier / 4;
            else if (unitType === 'Pips' && unit !== 'Lots') adjMult = multiplier * 10;
            else if (unitType === 'Points' && unit === 'Lots') adjMult = multiplier / 10;
            const cashRisk = bal * (risk / 100);
            const size = (sl > 0 && adjMult > 0) ? (cashRisk / (sl * adjMult)) : 0;
            document.getElementById('finalSize').innerText = size.toFixed(2);
            
            // Auto-save balance/risk changes per user
            if(currentUser) saveCloudData();
        }

        window.onload = () => { calculate(); };
    </script>
</body>
</html>
