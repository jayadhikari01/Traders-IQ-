<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traders IQ | The Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { background: #fdfdff; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; overflow-x: hidden; }

        .mesh-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
        }

        .gradient-text {
            background: linear-gradient(135deg, #0f172a 0%, #4338ca 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-premium {
            background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%);
            color: white; transition: all 0.4s ease;
            box-shadow: 0 20px 40px -10px rgba(67, 56, 202, 0.4);
        }

        .btn-premium:hover { transform: scale(1.05); }

        /* Modal Style */
        #modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 2.5rem; max-width: 400px; width: 100%; padding: 40px; text-align: center; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 50px 100px -20px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="antialiased">
    <div class="mesh-container"></div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content animate-bounce-short" onclick="event.stopPropagation()">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-2">Coming Soon</h3>
            <p class="text-slate-500 text-sm font-medium mb-8">We are finalizing the Elite Terminal. Stay tuned for the official launch!</p>
            <button onclick="closeModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest">Got it</button>
        </div>
    </div>

    <nav class="fixed top-6 w-full z-50 px-6">
        <div class="max-w-6xl mx-auto bg-white/80 backdrop-blur-2xl px-6 py-4 flex justify-between items-center rounded-3xl border border-white/40 shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg"><span class="text-white font-black text-xs">IQ</span></div>
                <div>
                    <h2 class="text-base font-black tracking-tighter leading-none text-slate-900">TRADERS IQ</h2>
                    <p class="text-[7px] font-bold text-indigo-500 tracking-[0.3em] uppercase mt-1">Adhikari Official</p>
                </div>
            </div>
            <button onclick="showComingSoon()" class="btn-premium px-5 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest">Join Now</button>
        </div>
    </nav>

    <main class="pt-48 pb-20 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <h1 class="gradient-text text-6xl md:text-9xl mb-10 leading-[1.1] font-extrabold tracking-tighter">Precision is <br> Everything.</h1>
            <p class="text-slate-500 text-lg md:text-2xl max-w-4xl mx-auto mb-16 font-medium">Official Ecosystem developed by <span class="text-indigo-600 font-black">ADHIKARI OFFICIAL</span>.</p>
            <button onclick="showComingSoon()" class="btn-premium px-14 py-6 rounded-3xl font-black text-[14px] uppercase tracking-widest">Get Started</button>
        </div>
    </main>

    <script>
        function showComingSoon() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
