<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traders IQ | Password Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            background: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #0f172a;
            overflow-x: hidden;
        }

        .mesh-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.12) 0px, transparent 50%);
        }

        .gradient-text {
            background: linear-gradient(135deg, #0f172a 0%, #4338ca 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bento-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .bento-input {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 1.25rem;
            transition: all 0.3s ease;
        }
        .bento-input:focus {
            border-color: #6366f1;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-premium {
            background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%);
            color: white;
            transition: all 0.4s ease;
            box-shadow: 0 20px 40px -10px rgba(67, 56, 202, 0.4);
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px -12px rgba(67, 56, 202, 0.6);
        }

        /* Custom Notification Toast Style */
        .elite-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #0f172a;
            color: white;
            padding: 16px 24px;
            border-radius: 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col justify-center items-center p-4">
    <div class="mesh-container"></div>

    <div id="eliteToast" class="elite-toast">
        <div class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></div>
        <span id="toastMessage"></span>
    </div>

    <div class="max-w-xl w-full text-center">
        <div class="bento-card p-10 md:p-12">
            <h1 class="gradient-text text-4xl mb-2 font-extrabold tracking-tighter text-center">
                Recover Access
            </h1>
            <p class="text-slate-400 text-[10px] mb-10 font-bold uppercase tracking-[0.3em]">Institutional Grade Security</p>

            <div class="space-y-6 text-left">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-2">Registered Email</label>
                    <input type="email" id="resetEmail" placeholder="Enter your email address" class="w-full bento-input p-4 text-sm font-semibold outline-none text-slate-900 mt-1">
                </div>
                
                <button id="sendResetBtn" class="w-full btn-premium py-5 rounded-3xl font-black text-xs uppercase tracking-widest">
                    Send Reset Link
                </button>

                <div class="text-center">
                    <a href="login.html" class="text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors">Return to Login</a>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <h2 class="text-xl font-black tracking-widest text-slate-800 uppercase mb-2">Adhikari Official</h2>
            <p class="text-slate-500 text-[9px] font-black tracking-[0.4em] uppercase">© 2026 TRADERS IQ • THE GOLD STANDARD</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAlGQSZgdk2Y6cIV0gBIGHCApGZXPg4lJk", 
            authDomain: "traders-iq-app-f5169.firebaseapp.com", 
            projectId: "traders-iq-app-f5169", 
            storageBucket: "traders-iq-app-f5169.firebasestorage.app", 
            messagingSenderId: "411253913617", 
            appId: "1:411253913617:web:a8b10dba8bbefe1fb1d9b0" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Professional English Toast Function
        window.showToast = (msg) => {
            const toast = document.getElementById('eliteToast');
            const message = document.getElementById('toastMessage');
            message.textContent = msg;
            toast.style.display = 'flex';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
        };

        document.getElementById("sendResetBtn").onclick = () => {
            const email = document.getElementById("resetEmail").value;
            
            if(!email) { 
                showToast("Please enter a valid email address."); 
                return; 
            }

            sendPasswordResetEmail(auth, email)
                .then(() => { 
                    showToast("Reset link dispatched. Please check your inbox."); 
                })
                .catch(err => { 
                    showToast(err.message); 
                });
        };
    </script>
</body>
</html>
