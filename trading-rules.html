<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Rules - Traders IQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlGQSZgdk2Y6cIV0gBIGHCApGZXPg4lJk",
            authDomain: "traders-iq-app-f5169.firebaseapp.com",
            projectId: "traders-iq-app-f5169",
            storageBucket: "traders-iq-app-f5169.firebasestorage.app",
            messagingSenderId: "411253913617",
            appId: "1:411253913617:web:a8b10dba8bbefe1fb1d9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // Global variables for other scripts
        window.db = db;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
        window.auth = auth;
        window.serverTimestamp = serverTimestamp; // Added for timezone tracking
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            background: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #0f172a; 
            -webkit-font-smoothing: antialiased; 
        }

        .mesh-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.12) 0px, transparent 50%);
        }

        .glass-card { 
            background: #FFFFFF; 
            border: 1px solid #e2e8f0; 
            border-radius: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .timer-display { font-variant-numeric: tabular-nums; letter-spacing: -0.05em; font-weight: 800; }
        
        .btn-premium {
            background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(67, 56, 202, 0.4);
        }

        .summary-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); display: none; }
        #confirmOverlay { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 24px; }
        
        .rule-checkbox { width: 24px; height: 24px; border-radius: 8px; border: 2px solid #e2e8f0; appearance: none; cursor: pointer; transition: all 0.2s; position: relative; flex-shrink: 0; background: #f1f5f9; }
        .rule-checkbox:checked { background-color: #6366F1; border-color: #6366F1; }
        .rule-checkbox:checked::after { content: '✓'; position: absolute; color: white; font-size: 14px; font-weight: 900; left: 5px; top: 0px; }
        
        .rule-text { transition: all 0.3s; font-size: 15px; font-weight: 700; color: #334155; }
        .rule-checkbox:checked + .rule-text { color: #94A3B8; text-decoration: line-through; }
        
        #saveToast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 12px 24px; border-radius: 1.5rem; font-weight: 800; font-size: 11px; z-index: 100; opacity: 0; pointer-events: none; transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.1em; }
        #saveToast.active { opacity: 1; top: 30px; }
    </style>
</head>
<body class="p-4 pb-48">
    <div class="mesh-container"></div>
    <div id="saveToast">Data Saved Successfully!</div>

    <div id="confirmOverlay">
        <div class="glass-card w-full max-w-xs p-8 text-center animate-in fade-in zoom-in duration-200">
            <h3 class="font-black uppercase text-[10px] tracking-widest text-slate-400 mb-2">Confirm Delete</h3>
            <p class="font-bold text-slate-700 mb-8">Are you sure you want to remove this rule?</p>
            <div class="flex gap-3">
                <button onclick="cancelDelete()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-[10px] uppercase tracking-widest">Cancel</button>
                <button id="confirmDelBtn" class="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest">Delete</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-10 mt-4">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="w-12 h-12 flex items-center justify-center bg-white border-2 border-slate-100 rounded-2xl text-slate-400 shadow-sm active:scale-90 transition-all">←</button>
                <div>
                    <h1 class="text-xl font-black italic uppercase tracking-tighter text-slate-900 leading-none">Trading <span class="text-indigo-600">Rules</span></h1>
                    <p class="text-[8px] font-black text-slate-400 tracking-widest uppercase mt-1">Traders IQ Terminal</p>
                </div>
            </div>
            <button onclick="manualSave()" class="btn-premium px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all flex items-center gap-2">
                Save
            </button>
        </div>

        <div class="glass-card p-8 mb-8 flex flex-col items-center">
            <div id="timer" class="timer-display text-5xl text-slate-900 mb-8">00:00:00</div>
            <div class="flex gap-3 w-full">
                <button id="timerBtn" onclick="toggleTimer()" class="flex-1 btn-premium py-5 rounded-3xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all">Start Session</button>
                <button onclick="resetTimer()" class="px-6 py-5 bg-slate-100 text-slate-500 rounded-3xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all">Reset</button>
            </div>
        </div>

        <div id="rulesList" class="space-y-4"></div>

        <div class="fixed bottom-8 left-0 right-0 px-6 max-w-md mx-auto z-40">
            <div class="flex gap-3 bg-white border-2 border-slate-100 p-2 rounded-[2.5rem] shadow-2xl items-center">
                <input type="text" id="ruleInput" placeholder="Add custom rule..." class="flex-1 bg-transparent px-6 py-3 font-bold outline-none text-sm text-slate-700">
                <button onclick="addRule()" class="btn-premium h-12 w-12 rounded-full flex items-center justify-center text-2xl font-bold active:scale-90 transition-transform">+</button>
            </div>
        </div>
    </div>
    
    <div id="summaryModal" class="summary-overlay fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-10 text-center animate-in zoom-in duration-300">
            <h2 class="text-3xl font-black text-slate-900 mb-2 tracking-tighter">Session Report</h2>
            <div class="grid grid-cols-2 gap-4 mb-10">
                <div class="bg-slate-50 p-5 rounded-[2rem] border-2 border-slate-100">
                    <span class="text-[9px] font-black text-slate-400 block mb-2 uppercase tracking-widest">Time</span>
                    <span id="sumTime" class="font-black text-slate-800 text-lg">00:00:00</span>
                </div>
                <div class="bg-slate-50 p-5 rounded-[2rem] border-2 border-slate-100">
                    <span class="text-[9px] font-black text-slate-400 block mb-2 uppercase tracking-widest">Score</span>
                    <span id="sumScore" class="font-black text-indigo-600 text-lg">0%</span>
                </div>
            </div>
            <button onclick="closeSummary()" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black uppercase text-[11px] tracking-widest">Confirm & Clear</button>
        </div>
    </div>

    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        
        const auth = getAuth();
        let currentUser = null;
        let startTime, timerInterval, isRunning = false, ruleToDeleteIndex = null;
        let rulesData = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadData();
            } else {
                window.location.href = "login.html";
            }
        });

        async function loadData() {
            if (!currentUser) return;
            const docRef = window.doc(window.db, "users", currentUser.uid);
            const docSnap = await window.getDoc(docRef);
            if (docSnap.exists()) {
                rulesData = docSnap.data().rules || [];
            } else {
                rulesData = [
                    { text: "Check High Impact News", checked: false },
                    { text: "HTF Trend Alignment", checked: false },
                    { text: "Risk Per Trade Calculated", checked: false }
                ];
            }
            renderRules();
        }

        window.manualSave = async function() {
            if (!currentUser) return;
            
            // Detecting user's local timezone automatically
            const userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

            await window.setDoc(window.doc(window.db, "users", currentUser.uid), { 
                rules: rulesData,
                lastUpdated: window.serverTimestamp(), // Saves exact global time
                userTimezone: userTimezone    // Saves user's current location timezone
            }, { merge: true });

            const toast = document.getElementById('saveToast');
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2000);
        }

        window.toggleTimer = function() {
            if (!isRunning) {
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    const now = Date.now();
                    const diff = now - startTime;
                    const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                    const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                    const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                    document.getElementById('timer').innerText = `${h}:${m}:${s}`;
                }, 1000);
                document.getElementById('timerBtn').innerText = "Stop Session";
                document.getElementById('timerBtn').classList.replace('btn-premium', 'bg-rose-500');
                isRunning = true;
            } else {
                showSummary();
                resetTimer();
            }
        };

        window.resetTimer = function() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('timer').innerText = "00:00:00";
            document.getElementById('timerBtn').innerText = "Start Session";
            document.getElementById('timerBtn').classList.replace('bg-rose-500', 'btn-premium');
        };

        function showSummary() {
            const followed = rulesData.filter(r => r.checked).length;
            const score = rulesData.length > 0 ? Math.round((followed / rulesData.length) * 100) : 0;
            document.getElementById('sumTime').innerText = document.getElementById('timer').innerText;
            document.getElementById('sumScore').innerText = `${score}%`;
            document.getElementById('summaryModal').style.display = 'flex';
        }

        window.closeSummary = function() {
            document.getElementById('summaryModal').style.display = 'none';
            rulesData.forEach(r => r.checked = false);
            window.manualSave();
            renderRules();
        };

        function renderRules() {
            const list = document.getElementById('rulesList');
            list.innerHTML = '';
            rulesData.forEach((rule, index) => {
                const div = document.createElement('div');
                div.className = "rule-item glass-card flex items-center justify-between p-6 mb-4";
                div.innerHTML = `
                    <label class="flex items-center gap-4 flex-1 cursor-pointer">
                        <input type="checkbox" class="rule-checkbox" ${rule.checked ? 'checked' : ''} onchange="toggleCheck(${index})">
                        <span class="rule-text">${rule.text}</span>
                    </label>
                    <button onclick="requestDelete(${index})" class="text-slate-300 hover:text-rose-500 transition-colors">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
                    </button>`;
                list.appendChild(div);
            });
        }

        window.addRule = function() {
            const input = document.getElementById('ruleInput');
            if (input.value.trim()) {
                rulesData.push({ text: input.value.trim(), checked: false });
                input.value = "";
                window.manualSave();
                renderRules();
            }
        };

        window.toggleCheck = function(index) {
            rulesData[index].checked = !rulesData[index].checked;
            window.manualSave();
        };

        window.requestDelete = function(index) {
            ruleToDeleteIndex = index;
            document.getElementById('confirmOverlay').style.display = 'flex';
            document.getElementById('confirmDelBtn').onclick = executeDelete;
        };

        window.cancelDelete = function() {
            document.getElementById('confirmOverlay').style.display = 'none';
            ruleToDeleteIndex = null;
        };

        function executeDelete() {
            if (ruleToDeleteIndex !== null) {
                rulesData.splice(ruleToDeleteIndex, 1);
                window.manualSave();
                renderRules();
            }
            cancelDelete();
        }
    </script>
</body>
</html>
