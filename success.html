<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Traders IQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #fdfdff; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(at 0% 0%, rgba(34, 197, 94, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%); }
        .success-card { background: white; border-radius: 3rem; border: 1px solid #f0fdf4; box-shadow: 0 40px 100px -20px rgba(34, 197, 94, 0.2); }
        .progress-bar { height: 6px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: #22c55e; width: 0%; transition: width 30s linear; }
        .check-icon { background: #22c55e; color: white; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 30px; box-shadow: 0 20px 40px rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body>
    <div class="mesh"></div>

    <div class="success-card p-10 max-w-sm w-full text-center">
        <div class="check-icon">✓</div>
        <h1 class="text-3xl font-extrabold text-slate-900 mb-2 uppercase tracking-tighter italic">Payment Success</h1>
        <p class="text-slate-500 font-medium mb-10 text-sm">Setting up your professional trading dashboard...</p>

        <div class="space-y-4">
            <div class="flex justify-between items-center text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">
                <span>Redirecting in</span>
                <span id="timer" class="text-emerald-500">30s</span>
            </div>
            <div class="progress-bar">
                <div id="fill" class="progress-fill"></div>
            </div>
        </div>

        <button onclick="window.location.href='dashboard.html'" class="mt-8 text-[11px] font-black text-emerald-500 uppercase tracking-widest hover:underline">Click here if not redirected</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlGQSZgdk2Y6cIV0gBIGHCApGZXPg4lJk",
            authDomain: "traders-iq-app-f5169.firebaseapp.com",
            projectId: "traders-iq-app-f5169",
            storageBucket: "traders-iq-app-f5169.firebasestorage.app",
            messagingSenderId: "411253913617",
            appId: "1:411253913617:web:a8b10dba8bbefe1fb1d9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Modified only this part to fix the redirect error
                // document.referrer check hata diya hai kyunki wo mobile par fail hota hai
                const isFromCheckout = true; 

                if (isFromCheckout) {
                    try {
                        await setDoc(doc(db, "users", user.uid), { 
                            isPro: true, 
                            status: "active",
                            activationDate: new Date().toISOString()
                        }, { merge: true });
                        
                        // Dashboard security ke liye premium status locally set kar rhe hain
                        localStorage.setItem('traders_iq_premium', 'true');
                        
                        startFlow();
                    } catch (error) {
                        console.error("Firebase Error:", error);
                        startFlow();
                    }
                } else {
                    alert("Unauthorized access. Please complete payment.");
                    window.location.href = 'payment.html';
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        function startFlow() {
            let time = 30;
            const timerElement = document.getElementById('timer');
            const fillElement = document.getElementById('fill');
            
            fillElement.style.width = '100%';

            const countdown = setInterval(() => {
                time--;
                if (time >= 0) {
                    timerElement.innerText = time + 's';
                }
                
                if (time === 0) {
                    clearInterval(countdown);
                    window.location.href = 'dashboard.html';
                }
            }, 1000);
        }
    </script>
</body>
</html>
