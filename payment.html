<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traders IQ | Elite Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background: #fdfdff; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; overflow-x: hidden; }
        .mesh-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%); }
        .bento-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid #e2e8f0; border-radius: 2.5rem; transition: 0.4s; }
        .btn-premium { background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%); color: white; box-shadow: 0 15px 30px -10px rgba(67, 56, 202, 0.4); cursor: pointer; }
        #toast { transition: 0.5s; transform: translate(-50%, 100px); opacity: 0; z-index: 100; }
        #toast.show { transform: translate(-50%, 0); opacity: 1; }
    </style>
</head>
<body class="min-h-screen py-20 px-6">
    <div class="mesh-container"></div>
    <div id="toast" class="fixed bottom-10 left-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl min-w-[320px] text-center font-bold -translate-x-1/2">
        <span id="toast-msg"></span>
    </div>

    <div class="max-w-6xl mx-auto text-center mb-16">
        <h1 class="text-5xl md:text-6xl font-black text-indigo-600 tracking-tighter mb-2">Elite Terminal Access</h1>
        <p class="text-slate-400 font-bold tracking-widest text-[10px]">ADHIKARI OFFICIAL VENTURE</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto mb-20">
        <div class="bento-card p-10 flex flex-col border-indigo-100 shadow-xl">
            <h3 class="text-xl font-black mb-1">Monthly Pro</h3>
            <div class="text-4xl font-black mb-8 text-slate-900">$9.99 <span class="text-sm text-slate-400">/mo</span></div>
            <ul class="space-y-4 mb-10 text-sm font-semibold text-slate-600 flex-grow">
                <li class="flex items-center gap-2">✅ AI Trading Mentor</li>
                <li class="flex items-center gap-2">✅ 100+ Performance Badges</li>
                <li class="flex items-center gap-2">✅ Profit Target Tracker</li>
            </ul>
            <button onclick="startPayment(9.99, 'Monthly Pro')" class="btn-premium w-full py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Activate Monthly</button>
        </div>

        <div class="bento-card p-10 flex flex-col border-indigo-200 shadow-2xl relative overflow-hidden">
            <div class="absolute top-5 right-5 bg-indigo-600 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase">Save 25%</div>
            <h3 class="text-xl font-black mb-1">Annual Elite</h3>
            <div class="flex items-baseline mb-8">
                <span class="text-slate-400 line-through text-lg mr-2 font-bold">$119.88</span>
                <span class="text-4xl font-black text-slate-900">$89.99</span>
            </div>
            <ul class="space-y-4 mb-10 text-sm font-semibold text-slate-600 flex-grow">
                <li class="flex items-center gap-2">✅ Unlimited AI Analysis</li>
                <li class="flex items-center gap-2">✅ Legend Status Badges</li>
                <li class="flex items-center gap-2">✅ Priority Support</li>
            </ul>
            <button onclick="startPayment(89.99, 'Annual Elite')" class="btn-premium w-full py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Activate Annual</button>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="bento-card p-8 border-dashed border-2 bg-white flex flex-col items-center">
            <input type="text" id="promoCode" placeholder="PROMO CODE" class="w-full bg-slate-100 p-4 rounded-xl text-sm font-bold text-center mb-4 outline-none">
            <button onclick="applyPromo()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase">Apply Code</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlGQSZgdk2Y6cIV0gBIGHCApGZXPg4lJk",
            authDomain: "traders-iq-app-f5169.firebaseapp.com",
            projectId: "traders-iq-app-f5169",
            storageBucket: "traders-iq-app-f5169.firebasestorage.app",
            messagingSenderId: "411253913617",
            appId: "1:411253913617:web:a8b10dba8bbefe1fb1d9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserId = null;
        let activePromo = null;

        onAuthStateChanged(auth, (u) => { if(u) currentUserId = u.uid; });

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        window.applyPromo = async () => {
            const code = document.getElementById('promoCode').value.trim().toUpperCase();
            if(!code) return showToast("Enter code!");
            try {
                const snap = await getDoc(doc(db, "promos", code));
                if(snap.exists() && snap.data().status === "active") {
                    activePromo = code;
                    showToast(`Code ${code} Applied!`);
                } else {
                    activePromo = null;
                    showToast("Invalid or Expired Code!");
                }
            } catch(e) { 
                showToast("Rules Error: Update Firebase Rules first!"); 
            }
        };

        window.startPayment = async (amt, plan) => {
            if(!currentUserId) return showToast("Please login first!");
            try {
                const res = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amt, planName: plan, user_id: currentUserId, promoCode: activePromo })
                });
                const data = await res.json();

                if(data.isFree) {
                    showToast("Access Granted! Redirecting...");
                    setTimeout(() => { window.location.href = `success.html?payment_id=FREE_${Date.now()}`; }, 1500);
                    return;
                }

                if(!data.id) throw new Error(data.error);

                const opt = {
                    "key": data.razorpayKeyId,
                    "amount": data.amount,
                    "currency": "INR",
                    "order_id": data.id,
                    "name": "Traders IQ",
                    "handler": (r) => { window.location.href = `success.html?payment_id=${r.razorpay_payment_id}`; },
                    "theme": { "color": "#6366f1" }
                };
                new Razorpay(opt).open();
            } catch(e) { showToast(e.message); }
        };
    </script>
</body>
</html>
